# =========================
# Global settings
# =========================
project:
  name: docking_pipeline
  author: renjin
  version: "1.0"
  description: "Unified docking pipeline for ZDOCK, HDOCK and HADDOCK3"

paths:
  workdir: ./results
  tmpdir: ./tmp
  logdir: ./logs

# =========================
# Software paths
# =========================
software:
  zdock:
    home: /home/renjin/Software/zdock3.0.2_linux_x64

  hdock:
    binary: hdock

  haddock3:
    binary: haddock3
    python: python3

# =========================
# Docking parameters
# =========================
parameters:
  zdock:
    grid_spacing: 1.2
    angular_step: 6
    top_models: 2000

  hdock:
    mode: global
    top_models: 100

  haddock3:
    sampling: 1000
    it0: true
    it1: true
    water: false

# =========================
# Runtime behavior
# =========================
runtime:
  overwrite: false
  keep_tmp: false
  verbose: true

# =========================
# Post-processing (预留)
# =========================
postprocess:
  extract_interface: true
  interface_cutoff: 5.0
  pymol:
    enabled: true
    style: cartoon
    color_receptor: cyan
    color_ligand: orange
